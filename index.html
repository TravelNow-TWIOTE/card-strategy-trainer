<!DOCTYPE html>
<html>
<head>
<title>Card Strategy Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Card Strategy Trainer</h1>

<div id="Points">Points: 1000</div>

<div>
Points to Play: <input id="pointsToPlayInput" type="number" value="100">
<button onclick="startRound()">Start Round</button>
<button onclick="continue()">Add Points +1000</button>
</div>

<hr>

<h2>Dealer</h2>
<div id="dealerCards"></div>
<div id="dealerTotal"></div>

<h2>Player</h2>
<div id="playerCards"></div>
<div id="playerTotal"></div>

<hr>

<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>
<button onclick="doubleDown()">Double</button>
<button onclick="split()">Split</button>
<button onclick="insurance()">Insurance</button>

<h3 id="message"></h3>

<script src="script.js"></script>

</body>
</html>
